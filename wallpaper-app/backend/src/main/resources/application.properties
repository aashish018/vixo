server.port=${PORT:8080}
server.forward-headers-strategy=framework

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/wallpaperdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.format_sql=false

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=${APP_UPLOAD_MAX_FILE_SIZE:15MB}
spring.servlet.multipart.max-request-size=${APP_UPLOAD_MAX_REQUEST_SIZE:15MB}

spring.cache.type=caffeine
spring.cache.cache-names=wallpapers,wallpaper,featuredWallpapers,categories
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=10m

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
app.cors.allowed-methods=${CORS_ALLOWED_METHODS:GET,POST,DELETE,OPTIONS}

app.rate-limit.capacity=${APP_RATE_LIMIT_CAPACITY:100}
app.rate-limit.duration-minutes=${APP_RATE_LIMIT_DURATION_MINUTES:10}

app.cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
app.cloudinary.api-key=${CLOUDINARY_API_KEY:}
app.cloudinary.api-secret=${CLOUDINARY_API_SECRET:}
app.cloudinary.folder=${CLOUDINARY_FOLDER:wallpaper-app}

app.seed.enabled=${APP_SEED_ENABLED:false}

logging.level.com.wallpaper.app=INFO
